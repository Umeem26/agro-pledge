<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPledge - Investor Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #121212; color: #ffffff; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #1e1e1e; max-width: 400px; }
        button { background-color: #00e676; color: black; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #555; color: #aaa; }
        .input-group { margin: 15px 0; }
        input { width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; }
        #status { margin-top: 15px; color: #00e676; word-break: break-all; }
    </style>
</head>
<body>

    <h2>🌱 AgroPledge - Investor Portal (Level 1)</h2>
    
    <div class="card">
        <!-- Tombol Connect / Disconnect Wallet -->
        <button id="btn-connect">Connect Freighter</button>
        
        <!-- Tampilan Alamat & Saldo -->
        <div class="input-group">
            <p><strong>Wallet Address:</strong> <span id="wallet-address">-</span></p>
            <p><strong>XLM Balance:</strong> <span id="wallet-balance">-</span> XLM</p>
        </div>

        <hr style="border-color: #333;">

        <!-- Formulir Kirim Transaksi (Simulasi Setor Modal) -->
        <h3>Simulasi Setor Dana</h3>
        <div class="input-group">
            <label>Alamat Tujuan (Petani/Escrow):</label>
            <input type="text" id="target-address" placeholder="Masukkan alamat Stellar G...">
        </div>
        <div class="input-group">
            <label>Jumlah (XLM):</label>
            <input type="number" id="amount" placeholder="Contoh: 10">
        </div>
        <button id="btn-send" disabled>Kirim Transaksi</button>

        <!-- Umpan Balik Status Transaksi -->
        <div id="status"></div>
    </div>

    <!-- Script utama kita nanti -->
    <script type="module" src="index.js"></script>
</body>
</html>
