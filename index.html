<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPledge - Investor Portal (Level 2)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #121212; color: #ffffff; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #1e1e1e; max-width: 450px; }
        button { background-color: #00e676; color: black; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }
        .input-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; }
        #status { margin-top: 15px; color: #ffcc00; word-break: break-all; font-weight: bold; padding: 10px; border-radius: 4px; background: #2a2307; border: 1px solid #665200; }
        .event-log { margin-top: 15px; background: #111; padding: 10px; border-radius: 4px; border: 1px solid #222; max-height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #00e676; }
    </style>
</head>
<body>

    <h2>🌱 AgroPledge - Investor Portal (Level 2 Yellow Belt)</h2>
    
    <div class="card">
        <!-- Tombol Connect Multi-Wallet -->
        <button id="btn-connect">Connect Wallet (Multi-Wallet)</button>
        
        <!-- Tampilan Alamat & Saldo -->
        <div class="input-group">
            <p><strong>Wallet Address:</strong> <br><span id="wallet-address" style="font-size: 12px; color: #aaa;">-</span></p>
            <p><strong>XLM Balance:</strong> <span id="wallet-balance">-</span> XLM</p>
        </div>

        <hr style="border-color: #333; margin: 20px 0;">

        <!-- Formulir Kontrak Pintar AgroPledge -->
        <h3>Escrow Crowdfunding Tani</h3>
        <p style="font-size: 11px; color: #888;">Contract ID: CB27QCP...7VQD</p>
        
        <div class="input-group">
            <div id="contract-live-status" style="font-size: 14px; color: #00e676; margin-bottom: 10px;">
                Total Dana Terkumpul: <span id="live-raised">Loading...</span> XLM
            </div>
        </div>

        <div class="input-group">
            <label>Jumlah Komitmen Investasi (XLM):</label>
            <input type="number" id="amount" placeholder="Contoh: 50" min="1">
        </div>
        <button id="btn-pledge" disabled>Setor Dana ke Kontrak</button>

        <!-- Umpan Balik Status Transaksi -->
        <div id="status">Status: Menunggu Koneksi Dompet...</div>

        <!-- Log Real-Time Live Events Blockchain -->
        <h4 style="margin-bottom: 5px; margin-top: 20px; color: #aaa;">📡 Live Event Feed:</h4>
        <div class="event-log" id="event-feed">Memulai sinkronisasi jaringan...</div>
    </div>

    <!-- Script utama -->
    <script type="module" src="index.js"></script>
</body>
</html>
